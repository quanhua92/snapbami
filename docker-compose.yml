services:
  server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  migrate:
    build: .
    env_file: .env
    entrypoint: uv run python scripts/migrate.py
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    restart: "no"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bamitools
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d bamitools"]
      interval: 3s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfs-data:/data

  rustfs-perms:
    image: alpine
    command: chown -R 10001:10001 /data
    volumes:
      - rustfs-data:/data
    depends_on:
      - rustfs

  rustfs-init:
    image: amazon/aws-cli
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_DEFAULT_REGION: ${S3_REGION}
    entrypoint: sh
    command: -c "aws s3api create-bucket --bucket ${S3_PUBLIC_BUCKET} --endpoint-url http://rustfs:9000 2>/dev/null || true && aws s3api create-bucket --bucket ${S3_PRIVATE_BUCKET} --endpoint-url http://rustfs:9000 2>/dev/null || true"
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  rustfs-data:
